version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: gomod
    directory: "/"
    groups:
      go-dependencies:
        patterns:
          - "*"
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
      default-days: 7
